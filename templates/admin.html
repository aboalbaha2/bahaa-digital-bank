<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الإدارية - بنك البهاء</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-dark: #161616;
            --border-color: #262626;
            --text-light: #ffffff;
            --text-gray: #888888;
            --accent-gold: #d4af37;
            --danger-red: #ff3333;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); 
            margin: 0; padding: 0; color: var(--text-light);
        }
        .navbar { 
            background-color: var(--panel-dark); padding: 20px; text-align: center; 
            font-size: 18px; font-weight: 700; border-bottom: 1px solid var(--border-color); color: var(--accent-gold);
        }
        .container { max-width: 800px; width: 92%; margin: 30px auto; }
        .panel { 
            background: var(--panel-dark); padding: 25px; border-radius: 14px; 
            border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.7); margin-bottom: 25px;
        }
        h2, h3 { margin-top: 0; color: var(--accent-gold); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-gray); }
        .form-group input, .form-group select { 
            width: 100%; padding: 12px; background-color: #0a0a0a; border: 1px solid var(--border-color); 
            border-radius: 6px; color: var(--text-light); box-sizing: border-box;
        }
        button { 
            padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; 
            cursor: pointer; width: 100%; background-color: var(--accent-gold); color: #000000; transition: all 0.2s;
        }
        button:hover { background-color: #bfa030; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-gray); font-weight: 600; }
        #toast-container { position: fixed; bottom: 20px; left: 20px; z-index: 9999; width: 300px; }
        .toast { background: var(--panel-dark); padding: 14px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border-color); font-size: 13px; }
        #adminDashboard { display: none; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div class="navbar">منظومة بنك البهاء الرقمية - الإدارة العليا 🏛️</div>

    <div class="container">
        <!-- بوابة التحقق من رمز الإدارة -->
        <div class="panel" id="adminAuth">
            <h2>التحقق من الهوية الإدارية</h2>
            <div class="form-group">
                <label>أدخل رمز المسؤول السري (ADMIN PIN):</label>
                <input type="password" id="adminPinInput" placeholder="أدخل الرمز لفتح النظام">
            </div>
            <button onclick="loginAdmin()">فتح لوحة التحكم 🔑</button>
        </div>

        <!-- لوحة التحكم الإدارية الكاملة -->
        <div id="adminDashboard">
            <div class="panel">
                <h3>إجراء تعديل مصرفي مباشر</h3>
                <div class="form-group">
                    <label>اسم المستخدم (العميل المراد تعديل حسابه):</label>
                    <input type="text" id="targetUser" placeholder="اسم حساب العميل">
                </div>
                <div class="form-group">
                    <label>نوع العملية الإدارية:</label>
                    <select id="actionType">
                        <option value="deposit">شحن/إيداع رصيد إضافي</option>
                        <option value="charge">تصفير أو تعيين رصيد محدد</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المبلغ المراد معالجته (د.أ):</label>
                    <input type="number" id="actionAmount" placeholder="0.00">
                </div>
                <button onclick="updateUserAccount()">تنفيذ العملية البنكية ⚡</button>
            </div>

            <div class="panel" style="overflow-x: auto;">
                <h3>قائمة حسابات العملاء المسجلين بالمنظومة</h3>
                <table>
                    <thead>
                        <tr>
                            <th>اسم المستخدم</th>
                            <th>الرصيد الحالي</th>
                            <th>الديون (القروض)</th>
                            <th>الرمز (PIN)</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="4" style="text-align:center; color:var(--text-gray);">جاري تحميل البيانات المصرفية...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <!-- محرّك العمليات التفاعلية للوحة الإدارة العليا -->
        <!-- محرّك العمليات التفاعلية للوحة الإدارة العليا بالاعتماد على الذاكرة الدائمة -->
    <script>
        let globalAdminPin = "";

        // دالة قراءة قاعدة البيانات المحلية الثابتة
        function getLocalDB() {
            const db = localStorage.getItem('bahaa_bank_db');
            return db ? JSON.parse(db) : {};
        }

        function saveLocalDB(db) {
            localStorage.setItem('bahaa_bank_db', JSON.stringify(db));
        }

        function showToast(msg, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderColor = isError ? 'var(--danger-red)' : 'var(--accent-gold)';
            toast.style.color = isError ? 'var(--danger-red)' : 'var(--text-light)';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function loginAdmin() {
            const pin = document.getElementById('adminPinInput').value.trim();
            if (!pin) return showToast('يرجى إدخال رمز التحقق الإداري', true);

            // رمز حماية لوحة الإدارة الثابت
            if (pin === "0511") {
                globalAdminPin = pin;
                document.getElementById('adminAuth').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                showToast('تمت المصادقة الأمنية لمدير النظام بنجاح');
                refreshUsersList();
            } else {
                showToast('الرمز السري للإدارة غير صحيح', true);
            }
        }

        function renderUsersTable(users) {
            const tbody = document.getElementById('usersTableBody');
            if (!users || users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--text-gray);">لا يوجد حسابات مسجلة في المنظومة حالياً</td></tr>`;
                return;
            }

            tbody.innerHTML = users.map(user => `
                <tr>
                    <td style="font-weight:600; color:var(--accent-gold);">${user.username}</td>
                    <td style="font-family:monospace;">${parseFloat(user.balance).toLocaleString()} د.أ</td>
                    <td style="font-family:monospace; color:${user.loans > 0 ? 'var(--danger-red)' : 'var(--text-gray)'};">${parseFloat(user.loans).toLocaleString()} د.أ</td>
                    <td style="font-family:monospace; color:var(--text-gray); font-size:12px;">${user.pin}</td>
                </tr>
            `).join('');
        }

        function refreshUsersList() {
            const db = getLocalDB();
            const usersList = [];

            for (const key in db) {
                if (db[key] && Array.isArray(db[key])) {
                    usersList.push({
                        username: db[key][0],  // اسم العرض الأصلي
                        balance: db[key][1],   // الرصيد الحالي
                        loans: db[key][2],     // الديون
                        pin: db[key][4]        // الرمز السري PIN للعميل
                    });
                }
            }
            renderUsersTable(usersList);
        }

        function updateUserAccount() {
            const targetUser = document.getElementById('targetUser').value.trim();
            const actionType = document.getElementById('actionType').value;
            const amount = parseFloat(document.getElementById('actionAmount').value);

            if (!targetUser || isNaN(amount) || amount < 0) {
                return showToast('يرجى إدخال اسم العميل والمبلغ بشكل صحيح', true);
            }

            const db = getLocalDB();
            const userClean = targetUser.toLowerCase();

            if (!db[userClean]) {
                return showToast('حساب العميل غير موجود في المنظومة', true);
            }

            // تنفيذ التعديل المالي المباشر في الذاكرة الدائمة
            if (actionType === "deposit") {
                db[userClean][1] += amount;
                db[userClean][3].push(`إيداع إداري مباشر بمبلغ ${amount} د.أ بواسطة الإدارة العليا`);
            } else if (actionType === "charge") {
                db[userClean][1] = amount;
                db[userClean][3].push(`تعديل الرصيد إدارياً إلى ${amount} د.أ بواسطة الإدارة العليا`);
            }

            saveLocalDB(db);
            showToast('تم تحديث حساب العميل في الذاكرة الدائمة بنجاح');
            document.getElementById('targetUser').value = "";
            document.getElementById('actionAmount').value = "";
            refreshUsersList(); // تحديث الجدول فوراً لعرض البيانات الجديدة
        }
    </script>
</body>
</html>
